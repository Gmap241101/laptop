name: Update Korean Public Holidays

on:
  workflow_dispatch:
    inputs:
      years:
        description: "생성할 연도 목록 예: 2026 2027"
        required: false
        default: ""
  schedule:
    - cron: "0 18 1 * *"

permissions:
  contents: write

jobs:
  update-holidays:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: source
        run: npm ci

      - name: Generate holiday JSON
        working-directory: source
        env:
          DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.years }}" ]; then
            npm run generate:holidays -- ${{ github.event.inputs.years }}
          else
            CURRENT_YEAR=$(TZ=Asia/Seoul date +%Y)
            NEXT_YEAR=$((CURRENT_YEAR + 1))
            npm run generate:holidays -- $CURRENT_YEAR $NEXT_YEAR
          fi

      - name: Update gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy to gh-pages
        run: |
          mkdir -p gh-pages/holidays
          cp -f source/public/holidays/*.json gh-pages/holidays/

      - name: Commit gh-pages
        working-directory: gh-pages
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add holidays/*.json

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update Korean public holiday JSON"
            git push origin gh-pages
          fi

      - name: Update gh-pages-2
        uses: actions/checkout@v4
        with:
          ref: gh-pages-2
          path: gh-pages-2

      - name: Copy to gh-pages-2
        run: |
          mkdir -p gh-pages-2/holidays
          cp -f source/public/holidays/*.json gh-pages-2/holidays/

      - name: Commit gh-pages-2
        working-directory: gh-pages-2
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add holidays/*.json

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update Korean public holiday JSON"
            git push origin gh-pages-2
          fi

      - name: Update gh-pages-3
        uses: actions/checkout@v4
        with:
          ref: gh-pages-3
          path: gh-pages-3

      - name: Copy to gh-pages-3
        run: |
          mkdir -p gh-pages-3/holidays
          cp -f source/public/holidays/*.json gh-pages-3/holidays/

      - name: Commit gh-pages-3
        working-directory: gh-pages-3
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add holidays/*.json

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update Korean public holiday JSON"
            git push origin gh-pages-3
          fi
